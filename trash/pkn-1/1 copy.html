    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap");

      body {
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      /* Animasi Latar & Elemen */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }

      @keyframes drift {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(100vw);
        }
      }
      .animate-drift-slow {
        animation: drift 40s linear infinite;
      }
      .animate-drift-fast {
        animation: drift 25s linear infinite;
      }

      @keyframes bounce-slight {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .animate-bounce-slight {
        animation: bounce-slight 2s ease-in-out infinite;
      }

      /* Animasi Feedback Jawaban */
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20%,
        60% {
          transform: translateX(-10px);
        }
        40%,
        80% {
          transform: translateX(10px);
        }
      }
      .animate-shake {
        animation: shake 0.5s ease-in-out;
      }

      @keyframes glow-gold {
        0%,
        100% {
          box-shadow:
            0 0 20px 5px rgba(250, 204, 21, 0.6),
            0 8px 0 #b45309;
        }
        50% {
          box-shadow:
            0 0 40px 15px rgba(250, 204, 21, 1),
            0 8px 0 #b45309;
          transform: scale(1.1);
        }
      }
      .animate-glow-gold {
        animation: glow-gold 1s ease-in-out;
        border-color: #fde047 !important;
        background-color: #fef08a !important;
      }

      @keyframes pop-in {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .animate-pop-in {
        animation: pop-in 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Kursor Kamera Tangan */
      #hand-cursor {
        position: absolute;
        width: 60px;
        height: 60px;
        pointer-events: none;
        z-index: 100;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
      }

      .progress-ring__circle {
        transition: stroke-dashoffset 0.1s linear;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }

      .lucide {
        display: inline-block;
      }
    </style>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
      // Audio System menggunakan Web Audio API
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      function playSuccessSound() {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";

        // Suara "Ting!" ceria (Arpeggio C Major)
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
        osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
        osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime + 0.3);

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.5,
        );

        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.5);
      }

      function playErrorSound() {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "triangle";

        // Bunyi "Boop" rendah untuk salah
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(
          100,
          audioCtx.currentTime + 0.3,
        );

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.3,
        );

        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.3);
      }

      // Data Permainan
      const rounds = [
        {
          question: "Ketuhanan Yang Maha Esa",
          correct: "bintang",
        },
        {
          question: "Kemanusiaan yang Adil dan Beradab",
          correct: "rantai",
        },
        {
          question: "Persatuan Indonesia",
          correct: "pohon",
        },
      ];

      const symbols = [
        {
          id: "bintang",
          icon: "⭐",
          name: "Bintang",
          color: "bg-yellow-400",
          shadow: "shadow-[0_10px_0_#b45309]",
          border: "border-yellow-200",
        },
        {
          id: "rantai",
          icon: "🔗",
          name: "Rantai",
          color: "bg-red-400",
          shadow: "shadow-[0_10px_0_#991b1b]",
          border: "border-red-200",
        },
        {
          id: "pohon",
          icon: "🌳",
          name: "Pohon Beringin",
          color: "bg-green-500",
          shadow: "shadow-[0_10px_0_#15803d]",
          border: "border-green-300",
        },
      ];

      let currentRound = 0;
      let isAnimating = false;
      let xp = 0;

      // Inisialisasi DOM
      const questionText = document.getElementById("question-text");
      const optionsContainer = document.getElementById("options-container");
      const owlMessage = document.getElementById("owl-message");

      function renderRound() {
        const round = rounds[currentRound];
        questionText.innerHTML = `Simbol mana yang melambangkan<br/> <span class="text-green-500">"${round.question}"</span>?`;

        optionsContainer.innerHTML = "";

        // Render 3 opsi
        symbols.forEach((symbol) => {
          const btn = document.createElement("div");
          btn.id = `btn-${symbol.id}`;
          btn.className = `option-btn relative w-36 h-36 md:w-40 md:h-40 rounded-[30px] flex flex-col items-center justify-center border-4 transition-all duration-300 cursor-pointer ${symbol.color} ${symbol.border} ${symbol.shadow}`;

          // Efek Hover default untuk Mouse
          btn.addEventListener(
            "mouseenter",
            () =>
              !isAnimating &&
              btn.classList.add("scale-105", "animate-bounce-slight"),
          );
          btn.addEventListener(
            "mouseleave",
            () =>
              !isAnimating &&
              btn.classList.remove("scale-105", "animate-bounce-slight"),
          );
          btn.addEventListener("click", () => handleSelection(symbol.id));

          btn.innerHTML = `
                    <span class="text-6xl drop-shadow-lg mb-2 pointer-events-none">${symbol.icon}</span>
                    <span class="text-white font-bold text-sm bg-black/20 px-3 py-1 rounded-full pointer-events-none">${symbol.name}</span>
                `;

          optionsContainer.appendChild(btn);
        });

        // Update Progress Dots
        document.querySelectorAll(".dot").forEach((dot, index) => {
          if (index < currentRound) {
            dot.className =
              "w-4 h-4 bg-green-500 rounded-full border-2 border-white shadow-sm dot"; // Selesai
          } else if (index === currentRound) {
            dot.className =
              "w-4 h-4 bg-yellow-400 rounded-full border-2 border-white shadow-sm animate-pulse dot"; // Aktif
          } else {
            dot.className =
              "w-4 h-4 bg-gray-300 rounded-full border-2 border-white shadow-sm dot"; // Belum
          }
        });

        isAnimating = false;
      }

      function handleSelection(selectedId) {
        if (isAnimating) return;
        isAnimating = true;

        const round = rounds[currentRound];
        const btn = document.getElementById(`btn-${selectedId}`);

        if (selectedId === round.correct) {
          // Jawaban Benar
          playSuccessSound();
          btn.classList.add("animate-glow-gold");
          owlMessage.innerText = "Hebat! Kerja bagus!";
          confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });

          // Tambah XP
          xp += 10;
          document.getElementById("xp-text").innerText = `${xp} / 100 XP`;
          document.getElementById("xp-bar-fill").style.width = `${xp}%`;

          setTimeout(() => {
            currentRound++;
            if (currentRound < rounds.length) {
              owlMessage.innerText = "Arahkan jarimu ke jawaban yang benar!";
              renderRound();
            } else {
              showVictory();
            }
          }, 2000);
        } else {
          // Jawaban Salah
          playErrorSound();
          btn.classList.add("animate-shake");
          owlMessage.innerText = "Ups, kurang tepat. Coba lagi!";

          setTimeout(() => {
            btn.classList.remove("animate-shake");
            owlMessage.innerText = "Arahkan jarimu ke jawaban yang benar!";
            isAnimating = false;
          }, 1000);
        }
      }

      function showVictory() {
        const overlay = document.getElementById("victory-overlay");
        const modal = document.getElementById("victory-modal");

        overlay.classList.remove("hidden");
        overlay.classList.add("flex");
        modal.classList.add("animate-pop-in");

        // Konfeti Penuh
        const duration = 3 * 1000;
        const end = Date.now() + duration;
        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
          });
          if (Date.now() < end) requestAnimationFrame(frame);
        })();
      }

      // --- SISTEM PELACAKAN TANGAN & KURSOR ---

      const videoElement = document.getElementById("input_video");
      const cursorElement = document.getElementById("hand-cursor");
      const cursorProgress = document.getElementById("cursor-progress");
      const camStatus = document.getElementById("cam-status");
      const camIndicator = document.getElementById("cam-indicator");

      let cursorX = window.innerWidth / 2;
      let cursorY = window.innerHeight / 2;
      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let hoveredButtonId = null;
      let hoverStartTime = 0;
      const HOVER_DURATION_TO_CLICK = 1000; // 1 detik untuk klik

      // Update Kursor di Layar
      function updateCursorUI(timestamp) {
        // Animasi pergerakan kursor yang lebih mulus (Smoothing Camera Jitter)
        // Diubah dari 0.2 ke 0.7 agar kursor merespons pergerakan jari JAUH lebih cepat
        cursorX += (targetX - cursorX) * 0.7;
        cursorY += (targetY - cursorY) * 0.7;

        cursorElement.style.left = `${cursorX}px`;
        cursorElement.style.top = `${cursorY}px`;

        // Logika Hover menggunakan Deteksi Kotak (Lebih Akurat & Tidak tertutup elemen lain)
        let btnHovered = null;
        const buttons = document.querySelectorAll(".option-btn");

        buttons.forEach((btn) => {
          const rect = btn.getBoundingClientRect();
          const padding = 30; // Toleransi area sentuh (hitbox) diperlebar agar anak lebih mudah
          if (
            cursorX >= rect.left - padding &&
            cursorX <= rect.right + padding &&
            cursorY >= rect.top - padding &&
            cursorY <= rect.bottom + padding
          ) {
            btnHovered = btn;
          }
        });

        if (btnHovered && !isAnimating) {
          const currentId = btnHovered.id.replace("btn-", "");

          if (hoveredButtonId === currentId) {
            // Masih hover tombol yang sama
            if (!hoverStartTime) hoverStartTime = timestamp;
            const elapsed = timestamp - hoverStartTime;

            // Isi Cincin Progres (Stroke Dashoffset: 188.4 -> 0)
            const percentage = Math.min(elapsed / HOVER_DURATION_TO_CLICK, 1);
            cursorProgress.style.strokeDashoffset = 188.4 * (1 - percentage);

            if (elapsed >= HOVER_DURATION_TO_CLICK) {
              handleSelection(currentId);
              hoveredButtonId = null;
              hoverStartTime = 0;
              cursorProgress.style.strokeDashoffset = 188.4;
            }
          } else {
            // Baru saja masuk ke tombol ini
            hoveredButtonId = currentId;
            hoverStartTime = timestamp;
            // Tambahkan efek visual hover
            document
              .querySelectorAll(".option-btn")
              .forEach((b) =>
                b.classList.remove("scale-105", "animate-bounce-slight"),
              );
            btnHovered.classList.add("scale-105", "animate-bounce-slight");
          }
        } else {
          // Tidak hover tombol apapun
          if (hoveredButtonId) {
            const oldBtn = document.getElementById(`btn-${hoveredButtonId}`);
            if (oldBtn)
              oldBtn.classList.remove("scale-105", "animate-bounce-slight");
          }
          hoveredButtonId = null;
          hoverStartTime = 0;
          cursorProgress.style.strokeDashoffset = 188.4;
        }

        requestAnimationFrame(updateCursorUI);
      }

      // --- Setup MediaPipe Hands ---
      async function initCamera() {
        try {
          const hands = new Hands({
            locateFile: (file) => {
              return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            },
          });

          hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // Diubah ke 0 agar AI berjalan lebih cepat dan ringan (mengurangi delay)
            minDetectionConfidence: 0.5, // Sedikit diturunkan agar lebih cepat mengenali tangan
            minTrackingConfidence: 0.5,
          });

          hands.onResults((results) => {
            cursorElement.style.opacity = "1";
            if (
              results.multiHandLandmarks &&
              results.multiHandLandmarks.length > 0
            ) {
              // Ambil posisi jari telunjuk (Landmark 8)
              const indexFinger = results.multiHandLandmarks[0][8];
              // Kamera di-mirror, jadi koordinat X dibalik dan diteruskan ke targetX
              targetX = (1 - indexFinger.x) * window.innerWidth;
              targetY = indexFinger.y * window.innerHeight;
            }
          });

          const camera = new Camera(videoElement, {
            onFrame: async () => {
              await hands.send({ image: videoElement });
            },
            width: 320,
            height: 240,
          });

          await camera.start();

          camStatus.innerText = "REC";
          camIndicator.className =
            "w-2 h-2 bg-red-500 rounded-full animate-pulse";
        } catch (error) {
          console.error("Kamera tidak dapat diakses:", error);
          camStatus.innerText = "OFF (Mouse Mode)";
          camIndicator.className = "w-2 h-2 bg-gray-500 rounded-full";
        }
      }

      // Fallback Mouse jika kamera tidak digunakan/loading
      document.addEventListener("mousemove", (e) => {
        cursorElement.style.opacity = "1";
        targetX = e.clientX;
        targetY = e.clientY;
        // Mouse tidak perlu delay animasi
        cursorX = e.clientX;
        cursorY = e.clientY;
      });

      // Start segalanya
      document.addEventListener("DOMContentLoaded", () => {
        renderRound();
        lucide.createIcons();
        requestAnimationFrame(updateCursorUI);
        initCamera(); // Memulai deteksi kamera
      });
    </script>
  </body>
</html>
