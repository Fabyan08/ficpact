    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap");

      body {
        font-family: "Nunito", sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      /* Animasi Khusus */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes drift {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(100vw);
        }
      }
      .animate-drift-slow {
        animation: drift 40s linear infinite;
      }
      .animate-drift-fast {
        animation: drift 25s linear infinite;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow:
            0 0 15px 5px rgba(255, 255, 255, 0.4),
            0 8px 0 rgba(0, 0, 0, 0.2);
        }
        50% {
          box-shadow:
            0 0 30px 10px rgba(255, 255, 255, 0.8),
            0 8px 0 rgba(0, 0, 0, 0.2);
        }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s infinite;
      }

      @keyframes bounce-slight {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      .animate-bounce-slight {
        animation: bounce-slight 2s ease-in-out infinite;
      }

      @keyframes zoom-in-map {
        from {
          transform: scale(1);
          opacity: 1;
          filter: blur(0px);
        }
        to {
          transform: scale(1.2);
          opacity: 0.8;
          filter: blur(5px);
        }
      }
      .animate-zoom-in {
        animation: zoom-in-map 0.8s forwards cubic-bezier(0.7, 0, 0.3, 1);
      }

      @keyframes pop-in {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .animate-pop-in {
        animation: pop-in 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Utilitas tambahan untuk ikon lucide */
      .lucide {
        display: inline-block;
      }
    </style>
  </head>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
      // State Variabel
      let xp = 40;
      let activeGameLevel = null;
      let isTransitioning = false;

      let levels = [
        {
          id: 1,
          title: "Mengenal angka 1-10",
          icon: "star",
          url: "../level/kelas-1/mtk/1.html",
          color: "bg-yellow-400",
          shadow: "shadow-[0_8px_0_#b45309]",
          border: "border-yellow-200",
          status: "completed",
          stars: 3,
          x: "10%",
          y: "45%",
          msg: "Ayo belajar angka 1 sampai 10 dengan menyenangkan!",
        },
        {
          id: 2,
          title: "Mengurutkan Angka 1–20",
          icon: "shield",
          url: "../level/kelas-1/mtk/2.html",
          color: "bg-green-400",
          shadow: "shadow-[0_8px_0_#15803d]",
          border: "border-green-200",
          status: "unlocked",
          stars: 0,
          x: "30%",
          y: "20%",
          msg: "Bisakah kamu mengurutkannya?",
        },
        {
          id: 3,
          title: "Membaca kata kalimat pendek",
          icon: "heart-handshake",
          color: "bg-teal-400",
          shadow: "shadow-[0_8px_0_#0f766e]",
          border: "border-teal-200",
          status: "locked",
          stars: 0,
          x: "50%",
          y: "60%",
          msg: "Coba baca kalimatnya dengan benar!",
        },
        {
          id: 4,
          title: "Menyusun Kalimat Sederhana",
          icon: "x-circle",
          color: "bg-cyan-400",
          shadow: "shadow-[0_8px_0_#0e7490]",
          border: "border-cyan-200",
          status: "locked",
          stars: 0,
          x: "70%",
          y: "25%",
          msg: "Hayo susun kalimatnya dengan benar!",
        },
        {
          id: 5,
          title: "Memahami Cerita Pendek dan Menjawab Pertanyaan",
          icon: "brush",
          color: "bg-orange-400",
          shadow: "shadow-[0_8px_0_#c2410c]",
          border: "border-orange-200",
          status: "locked",
          stars: 0,
          x: "90%",
          y: "45%",
          msg: "Ayo bekerja sama!",
        },
      ];
      // Inisialisasi awal
      document.addEventListener("DOMContentLoaded", () => {
        renderLevels();
        lucide.createIcons(); // Render ikon statis
      });

      // Fungsi Render Level ke DOM
      function renderLevels() {
        const container = document.getElementById("levels-container");
        container.innerHTML = ""; // Bersihkan container

        levels.forEach((level) => {
          const isLocked = level.status === "locked";
          const isCompleted = level.status === "completed";
          const isUnlocked = level.status === "unlocked";

          // Menyiapkan kelas CSS berdasarkan status
          const btnBaseClass =
            "relative w-24 h-24 rounded-[30px] flex items-center justify-center border-4 transition-all duration-300 z-20";

          let btnStateClass = "";
          if (isLocked) {
            btnStateClass =
              "bg-gray-300 border-gray-400 shadow-[0_8px_0_#9ca3af] opacity-80 cursor-not-allowed";
          } else {
            btnStateClass = `${level.color} ${level.border} ${level.shadow}`;
            if (isUnlocked)
              btnStateClass +=
                " animate-pulse-glow animate-bounce-slight scale-110 hover:-translate-y-2 hover:scale-125 hover:shadow-[0_12px_0_#15803d]";
            if (isCompleted)
              btnStateClass +=
                " hover:-translate-y-2 hover:shadow-[0_12px_0_#b45309]";
          }

          // Perhitungan batas (border) untuk segitiga balon obrolan
          const borderTailClass = level.border
            .replace("border-", "border-b-")
            .replace("border-", "border-r-");

          // Bintang untuk level yang diselesaikan
          let starsHtml = "";
          if (isCompleted) {
            starsHtml = `
                            <div class="flex gap-1 mt-6">
                                <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-current drop-shadow"></i>
                                <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-current drop-shadow"></i>
                                <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-current drop-shadow"></i>
                            </div>
                        `;
          }

          // Ceklis Badge untuk selesai
          const checkBadgeHtml = isCompleted
            ? `
                        <div class="absolute -top-3 -right-3 bg-yellow-400 border-4 border-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg z-30">
                            <i data-lucide="check" class="text-white w-5 h-5" stroke-width="4"></i>
                        </div>
                    `
            : "";

          // Ikon Utama dalam tombol
          const mainIconHtml = isLocked
            ? `<i data-lucide="lock" class="text-gray-500 w-9 h-9" stroke-width="2.5"></i>`
            : `<i data-lucide="${level.icon}" class="text-white drop-shadow-md w-11 h-11" stroke-width="2.5"></i>`;

          // Menyusun Elemen HTML Level
          const levelHtml = `
                        <div class="absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center group"
                             style="left: ${level.x}; top: ${level.y};"
                             onmouseenter="handleHover(${level.id}, true)"
                             onmouseleave="handleHover(${level.id}, false)">

                            <!-- Balon Judul Level -->
                            <div id="tooltip-${level.id}" class="absolute -top-16 bg-white px-4 py-2 rounded-xl border-4 shadow-xl whitespace-nowrap transition-all duration-300 z-30 pointer-events-none opacity-0 translate-y-4 scale-90 ${level.border}">
                                <p class="font-black text-gray-800 text-sm">${level.title}</p>
                                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 rotate-45 border-b-4 border-r-4 bg-white ${borderTailClass}"></div>
                            </div>

                            <!-- Tombol Level -->
                            <button onclick="handleLevelClick(${level.id})" ${isLocked ? "disabled" : ""} class="${btnBaseClass} ${btnStateClass}">
                                ${checkBadgeHtml}
                                ${mainIconHtml}
                                <!-- Indikator Angka -->
                                <div class="absolute -bottom-4 bg-white border-4 border-gray-200 text-gray-800 font-black w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                                    ${level.id}
                                </div>
                            </button>

                            ${starsHtml}
                        </div>
                    `;

          container.insertAdjacentHTML("beforeend", levelHtml);
        });

        // Re-inisialisasi ikon Lucide untuk elemen yang baru dirender
        lucide.createIcons();
      }

      // Event Hover
      function handleHover(levelId, isHovering) {
        const tooltip = document.getElementById(`tooltip-${levelId}`);
        const owlMessage = document.getElementById("owl-message");

        if (isHovering) {
          tooltip.classList.remove("opacity-0", "translate-y-4", "scale-90");
          tooltip.classList.add("opacity-100", "translate-y-0", "scale-100");

          const level = levels.find((l) => l.id === levelId);
          owlMessage.innerText = level.msg;
        } else {
          tooltip.classList.remove("opacity-100", "translate-y-0", "scale-100");
          tooltip.classList.add("opacity-0", "translate-y-4", "scale-90");

          owlMessage.innerText = "Siap belajar Pancasila? Ayo mulai!";
        }
      }

      // Klik Tombol Level
      function handleLevelClick(levelId) {
        if (isTransitioning) return;

        const level = levels.find((l) => l.id === levelId);
        if (level.status === "locked") return;

        isTransitioning = true;
        const mapArea = document.getElementById("map-area");

        // Tambahkan animasi zoom-in ke peta
        mapArea.classList.add("animate-zoom-in");

        setTimeout(() => {
          activeGameLevel = level;
          openMiniGame(level);

          // Jangan hapus animasi mapArea di sini agar tetap zoom/blur selama overlay aktif!
          isTransitioning = false;
        }, 800);
      }

      // Buka UI Simulasi Permainan Mini
      function openMiniGame(level) {
        const overlay = document.getElementById("mini-game-overlay");
        const title = document.getElementById("game-title");
        const iconContainer = document.getElementById("game-icon-container");
        const modal = document.getElementById("mini-game-modal");

        title.innerText = level.title;

        iconContainer.className = `mb-6 text-white p-4 rounded-3xl ${level.color}`;
        iconContainer.innerHTML = `<i data-lucide="${level.icon}" class="w-20 h-20"></i>`;

        // INI YANG PENTING
        document.getElementById("game-link").href = level.url;

        lucide.createIcons();

        overlay.classList.remove("hidden");
        overlay.classList.add("flex");

        modal.classList.remove("animate-pop-in");
        void modal.offsetWidth;
        modal.classList.add("animate-pop-in");
      }

      // Menyelesaikan Permainan Mini
      function completeMiniGame() {
        // Update Logika Level
        const currentIndex = levels.findIndex(
          (l) => l.id === activeGameLevel.id,
        );

        levels[currentIndex].status = "completed";
        levels[currentIndex].stars = 3;

        // Buka level berikutnya jika ada
        if (currentIndex + 1 < levels.length) {
          levels[currentIndex + 1].status = "unlocked";
        }

        // Tambah XP (maksimal 100)
        xp = Math.min(xp + 20, 100);
        updateXPBar();

        // Tutup Overlay dan kembalikan Peta
        const overlay = document.getElementById("mini-game-overlay");
        const mapArea = document.getElementById("map-area");

        overlay.classList.add("hidden");
        overlay.classList.remove("flex");

        // Kembalikan efek zoom peta ke ukuran normal
        mapArea.classList.remove("animate-zoom-in");

        activeGameLevel = null;
        renderLevels();
      }

      // Update UI XP Bar
      function updateXPBar() {
        document.getElementById("xp-text").innerText = `${xp} / 100 XP`;
        document.getElementById("xp-bar-fill").style.width = `${xp}%`;
      }
      function cancelMiniGame() {
        const overlay = document.getElementById("mini-game-overlay");
        const mapArea = document.getElementById("map-area");

        overlay.classList.add("hidden");
        overlay.classList.remove("flex");

        mapArea.classList.remove("animate-zoom-in");

        activeGameLevel = null;
      }
    </script>
  </body>
</html>
